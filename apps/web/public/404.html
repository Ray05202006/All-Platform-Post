<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>All Platform Post</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Encodes the path into a query parameter so index.html can restore it
      var segmentCount = 1; // number of path segments in basePath (/All-Platform-Post = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
