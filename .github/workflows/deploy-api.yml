name: Deploy Azure Functions API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @all-platform-post/shared build
          pnpm --filter @all-platform-post/text-splitter build

      - name: Build Azure Functions
        run: pnpm --filter @all-platform-post/azure-functions build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-functions-dist
          path: |
            apps/azure-functions/dist
            apps/azure-functions/host.json
            apps/azure-functions/package.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      FUNCTION_APP_NAME: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_FUNCTIONS_URL: ${{ secrets.AZURE_FUNCTIONS_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-functions-dist
          path: deploy

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure Functions app settings
        env:
          DATABASE_URL: ${{ secrets.POSTGRES_CONNECTION_STRING }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          TWITTER_CLIENT_ID: ${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET: ${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              DATABASE_URL="$DATABASE_URL" \
              ENCRYPTION_KEY="$ENCRYPTION_KEY" \
              JWT_SECRET="$JWT_SECRET" \
              NEXT_PUBLIC_APP_URL="https://Ray05202006.github.io/All-Platform-Post" \
              API_URL="$AZURE_FUNCTIONS_URL" \
              CORS_ORIGIN="https://Ray05202006.github.io" \
              FACEBOOK_APP_ID="$FACEBOOK_APP_ID" \
              FACEBOOK_APP_SECRET="$FACEBOOK_APP_SECRET" \
              TWITTER_CLIENT_ID="$TWITTER_CLIENT_ID" \
              TWITTER_CLIENT_SECRET="$TWITTER_CLIENT_SECRET" \
              TWITTER_API_KEY="$TWITTER_API_KEY" \
              TWITTER_API_SECRET="$TWITTER_API_SECRET" \
              GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET"

      - name: Output Google Authorized Redirect URI
        run: echo "Google Redirect URI = ${AZURE_FUNCTIONS_URL}/api/auth/google/callback"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: deploy
          respect-funcignore: true

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.POSTGRES_CONNECTION_STRING }}
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @all-platform-post/api prisma:generate
          DATABASE_URL="$DATABASE_URL" npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
