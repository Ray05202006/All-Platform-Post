name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/azure-functions/**'
      - 'packages/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @all-platform-post/shared build
          pnpm --filter @all-platform-post/text-splitter build

      - name: Build Azure Functions
        run: pnpm --filter @all-platform-post/azure-functions build

      - name: Run Prisma migrations
        env:
          POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
        run: pnpm --filter api prisma migrate deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: apps/azure-functions
          respect-pom-xml: false

      - name: Logout from Azure
        if: always()
        run: az logout
