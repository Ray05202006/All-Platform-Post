name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @all-platform-post/shared build
          pnpm --filter @all-platform-post/text-splitter build

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.AZURE_FUNCTIONS_URL }}" ]; then
            echo "::error::Secret AZURE_FUNCTIONS_URL is not set. Frontend will have no API URL."
            exit 1
          fi

      - name: Build Next.js static export
        env:
          NEXT_PUBLIC_BASE_PATH: /All-Platform-Post
          NEXT_PUBLIC_APP_URL: https://${{ github.repository_owner }}.github.io/All-Platform-Post
          NEXT_PUBLIC_API_URL: ${{ secrets.AZURE_FUNCTIONS_URL }}
        run: pnpm --filter web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
